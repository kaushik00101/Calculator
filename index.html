<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="calculator">
		<form action="">
				<input type="text" id="numQuery">
			<div id="btn">
			<div class="nums">
				<div class="n">
					<button id="1" type="button" value="1" class="b">1</button>
					<button id="2" type="button" value="2" class="b">2</button>
					<button id="3" type="button" value="3" class="b">3</button>
				</div>
				<div class="n">
					<button id="4" type="button" value="4" class="b">4</button>
					<button id="5" type="button" value="5" class="b">5</button>
					<button id="6" type="button" value="6" class="b">6</button>
				</div>
				<div class="n">
					<button id="7" type="button" value="7" class="b">7</button>
					<button id="8" type="button" value="8" class="b">8</button>
					<button id="9" type="button" value="9" class="b">9</button>
				</div>
				<div class="n">
					<button id="." type="button" value="." class="b">.</button>
					<button id="0" type="button" value="0" class="b">0</button>
					<button id="eq" type="button" value="=" class="b">=</button>
				</div>
			</div>
			<div id="opp">
				<button id="del" type="button"	 value="del" class="e">del</button>
				<button id="add" type="button" value="+" class="b">+</button>
				<button id="sub" type="button" value="-" class="b">-</button>
				<button id="mul" type="button" value="*" class="b">*</button>
				<button id="div" type="button" value="/" class="b">/</button>
			</div>
			</div>
		</form>
	</div>
	<script src="script.js"></script>
</body>
</html>
